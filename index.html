<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="ઓફિસ સન્ડે અને ઓવરટાઇમ પ્લાનર - ડિપાર્ટમેન્ટ વાઇઝ સન્ડે અને ઓવરટાઇમ હાજરી મેનેજમેન્ટ | Office Sunday & Overtime Planner for seamless attendance tracking.">
    <title>ઓફિસ સન્ડે અને ઓવરટાઇમ પ્લાનર | Office Sunday & Overtime Planner</title>
    
    <!-- Google Fonts: Outfit (English) & Noto Sans Gujarati (Gujarati) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- html2canvas for capturing premium reports as images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="sunday-theme">
    <div class="container">
        <!-- Header Section -->
        <header>
            <div class="title-wrapper">
                <h1 id="main-title">📊 ઓફિસ એટેન્ડન્સ પ્લાનર</h1>
                <button id="main-edit-title-btn" class="edit-title-btn" onclick="editMainTitle()" title="Edit Company Name" aria-label="Edit Company Name">✏️</button>
            </div>
            <p id="main-sub">ડિપાર્ટમેન્ટ વાઇઝ સન્ડે અને ઓવરટાઇમ હાજરી મેનેજમેન્ટ</p>
            <div id="connection-status" style="margin-top: 8px; font-weight: 600; font-size: 0.9rem; color: #64748b; padding: 4px 12px; background: var(--panel-muted); border-radius: 20px; display: inline-block;">🟡 Connecting...</div>
            
            <div class="theme-switcher-wrapper">
                <button id="btn-toggle-lang" class="lang-btn" onclick="toggleLanguage()" aria-label="Switch Language">🌐 English / ગુજરાતી</button>
                <button id="btn-toggle-theme" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">🌓 Dark / Light</button>
            </div>
        </header>

        <!-- Controls & Customizations Row -->
        <section class="controls-row" aria-label="Planner Controls">
            <div class="left-controls">
                <div class="date-input-wrapper">
                    <span id="label-date">📅 તારીખ:</span>
                    <input type="date" id="attendance-date" onchange="onDateChange()" aria-label="Select Date">
                </div>
                <div class="mode-switcher-container">
                    <div class="mode-switcher" role="group" aria-label="Select Mode">
                        <button id="btn-sunday" class="mode-btn active-sunday" onclick="switchMode('sunday')">☀️ Sunday</button>
                        <button id="btn-ot" class="mode-btn" onclick="switchMode('ot')">⏱️ Overtime</button>
                    </div>
                    <div id="shift-time-box" class="shift-time-wrapper">
                        <label id="label-shift-time" for="shift-time-input">⏰ Shift Time:</label>
                        <input type="text" id="shift-time-input" placeholder="09:00 AM To 05:00 PM" onchange="onShiftTimeChange()">
                    </div>
                </div>
            </div>
            <div class="add-dept-form" id="add-dept-container">
                <input type="text" id="new-dept-name" placeholder="નવો વિભાગ ઉમેરો..." onkeypress="handleDeptKeyPress(event)" aria-label="New Department Name">
                <button id="add-dept-btn" onclick="addDepartment()">+ વિભાગ</button>
            </div>
        </section>

        <!-- Capture Area (Final Report Summary Box) -->
        <main class="download-capture-area" id="capture-zone">
            <!-- Header visible only when generating PNG -->
            <div class="capture-header" id="image-capture-header">
                <h2 id="cap-office-title">Office Attendance Planner</h2>
                <p id="cap-date-details">09/06/2026 (Tuesday) | Mode: Sunday</p>
            </div>

            <div class="summary-wrapper">
                <!-- Panel 1: Final Count Report -->
                <article class="panel-card" id="panel-report">
                    <h2 class="panel-title" id="report-header">📋 ફાઇનલ કાઉન્ટ રીપોર્ટ</h2>
                    <div class="report-grid" id="report-grid-box"></div>
                    
                    <!-- Extra Snacks Counters for Overtime Mode -->
                    <div id="extra-food-box" class="extra-container" style="display: none;">
                        <div class="extra-control">
                            <span id="label-ext-nasto">🍩 એક્સ્ટ્રા નાસ્તો:</span>
                            <div class="counter-actions">
                                <button class="extra-btn" onclick="changeExtra('nasto', -1)" aria-label="Decrease snacks">-</button>
                                <span class="extra-val" id="ext-nasto-val">0</span>
                                <button class="extra-btn" onclick="changeExtra('nasto', 1)" aria-label="Increase snacks">+</button>
                            </div>
                        </div>
                        <div class="extra-control">
                            <span id="label-ext-faral">🥛 એક્સ્ટ્રા ફરાળ:</span>
                            <div class="counter-actions">
                                <button class="extra-btn" onclick="changeExtra('faral', -1)" aria-label="Decrease faral">-</button>
                                <span class="extra-val" id="ext-faral-val">0</span>
                                <button class="extra-btn" onclick="changeExtra('faral', 1)" aria-label="Increase faral">+</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grand-footer" id="r-total-text"></div>
                </article>

                <!-- Panel 2: Present Staff List -->
                <article class="panel-card" id="panel-staff">
                    <h2 class="panel-title" id="filtered-header">👤 હાજર સ્ટાફની યાદી</h2>
                    <div class="filtered-horizontal-grid" id="filtered-horizontal-box"></div>
                </article>
            </div>
        </main>

        <!-- Backup and Tool Actions Row -->
        <section class="download-action-container" aria-label="Data Backup & Action Panel">
            <div class="utility-buttons">
                <button id="main-lock-btn" class="lock-btn" onclick="toggleSecurityLock()">🔒 Lock (Safe Mode)</button>
                <button id="main-erase-btn" class="erase-btn" onclick="eraseAllAttendance()">🧹 Erase All</button>
                <button id="main-export-btn" class="backup-btn export-btn" onclick="exportBackupData()">📥 Export Backup</button>
                <button id="main-import-btn" class="backup-btn import-btn" onclick="triggerImportClick()">📤 Import Backup</button>
                <input type="file" id="hidden-file-input" accept=".txt" style="display: none;" onchange="importBackupData(event)" aria-label="Select Backup File">
            </div>
            
            <button id="btn-download-report" class="main-download-btn" onclick="downloadReportImage()">
                📸 <span id="label-download-btn">ડાઉનલોડ રીપોર્ટ (Image)</span>
            </button>
        </section>

        <!-- Department Details Grid -->
        <section id="main-departments-grid" class="departments-grid" aria-label="Departments Management"></section>
    </div>

    <!-- Firebase SDKs -->
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Core App Logic -->
    <script defer src="app.js"></script>
</body>
</html>
